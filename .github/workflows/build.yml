name: Build

on:
  push:
    branches:
      - "main"
      - "dev_**"
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "CHANGELOG.md"
  pull_request:
    branches:
      - "main"
      - "dev_**"
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "CHANGELOG.md"

jobs:
    build-windows:
        name: Windows build
        runs-on: windows-latest

        defaults:
          run:
            shell: msys2 {0}

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                submodules: recursive

            - name: Install dependencies
              uses: msys2/setup-msys2@v2
              with:
                msystem: UCRT64
                update: true
                install: mingw-w64-ucrt-x86_64-gcc libffi-devel make gettext

            - name: Setup windres
              run: ln -sf "${MSYSTEM_PREFIX}/bin/windres.exe" "${MSYSTEM_PREFIX}/bin/x86_64-w64-mingw32-windres"

            - name: Build project
              run: |
                make clean
                make TARGET=WINDOWS

    build-linux:
        name: Linux build
        runs-on: ubuntu-22.04

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                submodules: recursive

            - name: Install dependencies
              run: |
                sudo apt-get update -y
                sudo apt-get install -y --no-install-recommends libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev gettext

            - name: Build project
              run: |
                make clean
                make
